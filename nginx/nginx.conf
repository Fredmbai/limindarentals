worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include      /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile           on;
    keepalive_timeout  65;
    client_max_body_size 20M;

    # Gzip
    gzip            on;
    gzip_vary       on;
    gzip_min_length 1024;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;

    # ── Upstream services ─────────────────────────────────────────────────────
    upstream django {
        server django:8000;
    }

    upstream nextjs {
        server nextjs:3000;
    }

    # ── HTTP → HTTPS redirect ─────────────────────────────────────────────────
    server {
        listen 80;
        server_name lumidahrentals.co.ke www.lumidahrentals.co.ke;

        # Allow Let's Encrypt ACME challenge through HTTP
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name lumidahrentals.co.ke www.lumidahrentals.co.ke;

        # ── SSL ───────────────────────────────────────────────────────────────
        ssl_certificate     /etc/letsencrypt/live/lumidahrentals.co.ke/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/lumidahrentals.co.ke/privkey.pem;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Content-Type-Options    nosniff                                        always;
        add_header X-Frame-Options           DENY                                           always;
        add_header Referrer-Policy           "strict-origin-when-cross-origin"              always;

        # ── Django: API, admin, static, media ─────────────────────────────────
        location ~ ^/(api|admin|static|media)/ {
            proxy_pass         http://django;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 120s;
            proxy_connect_timeout 10s;

            # Allow large file uploads (bank transfer proofs)
            client_max_body_size 20M;
        }

        # ── Next.js: everything else (including WebSocket for HMR if needed) ──
        location / {
            proxy_pass         http://nextjs;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;

            # WebSocket support (Next.js uses this for HMR; also required if
            # the app ever uses server-sent events or WebSocket API routes)
            proxy_http_version 1.1;
            proxy_set_header   Upgrade    $http_upgrade;
            proxy_set_header   Connection "upgrade";
        }
    }
}
